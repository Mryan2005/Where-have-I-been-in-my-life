<div class="app-shell">
  <!-- Top navigation bar -->
  <nav class="topbar">
    <div class="topbar-brand">
      <span class="brand-icon">🌏</span>
      <span class="brand-name">我去过的地方</span>
    </div>
    <button class="btn-add-nav" (click)="openAddDialog()" title="添加新地点">
      <span>＋</span> 添加地点
    </button>
  </nav>

  <!-- Full-screen 3D map -->
  <div class="map-wrapper">
    <app-map
      (locationSelected)="onLocationSelected($event)"
      (mapClicked)="onMapClicked($event)"
    ></app-map>
  </div>

  <!-- macOS window for location detail -->
  <app-location-panel
    *ngIf="selectedLocation"
    [location]="selectedLocation"
    (closed)="onPanelClosed()"
    (editRequested)="onEditRequested($event)"
  ></app-location-panel>

  <!-- Add / Edit dialog -->
  <app-add-location-dialog
    *ngIf="showDialog"
    [initialLat]="dialogInitialLat"
    [initialLng]="dialogInitialLng"
    [editLocation]="editingLocation"
    (saved)="onLocationSaved($event)"
    (cancelled)="onDialogCancelled()"
  ></app-add-location-dialog>
</div>
